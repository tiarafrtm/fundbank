kind = "mobile"
previewPath = "/mobile/"
title = "Antrian Bank - Aplikasi Nasabah"
version = "1.0.0"
id = "artifacts/mobile-nasabah"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 22375

[services.development]
run = "pnpm --filter @workspace/mobile-nasabah run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mobile-nasabah", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/mobile-nasabah", "run", "serve" ]

[services.env]
PORT = "22375"
BASE_PATH = "/mobile/"
