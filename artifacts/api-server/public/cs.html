<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard CS — Sistem Antrian Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/dashboard.css" />
</head>
<body>

  <div class="app-layout">

    <!-- ===== SIDEBAR ===== -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-top">
        <div class="sidebar-brand">
          <div class="sb-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
              <rect x="2" y="7" width="20" height="14" rx="2"/>
              <path d="M16 7V5a2 2 0 0 0-4 0v2"/>
              <path d="M12 12v4"/><path d="M9 12h6"/>
            </svg>
          </div>
          <span class="sb-title">Antrian Bank</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <a class="nav-item active" data-page="overview" href="#overview">
          <svg class="nav-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
          </svg>
          <span class="nav-label">Ringkasan</span>
        </a>
        <a class="nav-item" data-page="buat" href="#buat">
          <svg class="nav-icon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="16"/>
            <line x1="8" y1="12" x2="16" y2="12"/>
          </svg>
          <span class="nav-label">Buat Antrian</span>
        </a>
      </nav>

      <!-- Info Pengguna + Keluar -->
      <div class="sidebar-footer">
        <div class="sb-user">
          <div class="sb-avatar" id="sb-avatar">C</div>
          <div class="sb-user-info">
            <span class="sb-user-name" id="sb-user-name">CS</span>
            <span class="sb-user-role">Pelayanan Nasabah</span>
          </div>
          <button class="btn-logout" id="logout-btn" title="Keluar">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
              <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
            </svg>
          </button>
        </div>
      </div>
    </aside>

    <!-- ===== AREA UTAMA ===== -->
    <div class="main-wrapper">

      <!-- Topbar -->
      <header class="topbar">
        <div class="topbar-left">
          <button id="topbar-toggle" class="tb-toggle" title="Buka/Tutup Menu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <h2 class="page-title" id="page-title">Ringkasan</h2>
        </div>
        <div class="topbar-right"></div>
      </header>

      <!-- Konten Utama -->
      <main class="main-content">

        <!-- ===== RINGKASAN (Statistik + Daftar Antrian) ===== -->
        <div id="page-overview" class="sub-page active">
          <div class="stats-date" id="stats-date"></div>

          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon stat-blue">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                  <circle cx="9" cy="7" r="4"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-total">—</div>
                <div class="stat-label">Total Hari Ini</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon stat-yellow">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-menunggu">—</div>
                <div class="stat-label">Menunggu</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon stat-blue2">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-dipanggil">—</div>
                <div class="stat-label">Dipanggil</div>
              </div>
            </div>
            <div class="stat-card">
              <div class="stat-icon stat-green">
                <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </div>
              <div class="stat-info">
                <div class="stat-value" id="stat-selesai">—</div>
                <div class="stat-label">Selesai</div>
              </div>
            </div>
          </div>

          <!-- Tabel antrian menunggu -->
          <div class="panel panel-table">
            <div class="table-header">
              <h2>
                <span class="dot-live"></span>
                Antrian Menunggu
              </h2>
              <div class="table-actions">
                <span class="refresh-hint">Perbarui otomatis</span>
                <button class="btn btn-outline btn-sm" id="refresh-btn">Perbarui</button>
              </div>
            </div>
            <div class="table-wrapper">
              <table class="queue-table">
                <thead>
                  <tr>
                    <th>No. Antrian</th>
                    <th>Nama Nasabah</th>
                    <th>Layanan</th>
                    <th>Waktu Ambil</th>
                    <th>Aksi</th>
                  </tr>
                </thead>
                <tbody id="queue-tbody">
                  <tr class="empty-row"><td colspan="5">Memuat data...</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- ===== BUAT ANTRIAN ===== -->
        <div id="page-buat" class="sub-page">
          <div class="panel" style="max-width:480px;">
            <p class="panel-label">Buat Nomor Antrian Baru</p>
            <div class="notif-form" id="form-buat">
              <div class="form-group">
                <label for="cs-nama">Nama Nasabah</label>
                <input type="text" id="cs-nama" placeholder="Nama lengkap nasabah" />
              </div>
              <div class="form-group">
                <label for="cs-nohp">
                  Nomor Telepon
                  <span style="font-weight:400;color:var(--gray-400);text-transform:none;">&nbsp;(opsional, untuk notifikasi WA)</span>
                </label>
                <input type="tel" id="cs-nohp" placeholder="08xxxxxxxxxx" />
              </div>
              <div class="form-group">
                <label for="cs-layanan">Jenis Layanan</label>
                <select id="cs-layanan" class="select-input">
                  <option value="Tabungan">Tabungan</option>
                  <option value="Kredit">Kredit</option>
                  <option value="Umum">Umum</option>
                </select>
              </div>
              <div id="buat-result" class="alert hidden"></div>
              <button class="btn btn-primary btn-block" id="buat-btn">Buat Nomor Antrian</button>
            </div>

            <!-- Tiket hasil -->
            <div id="tiket-section" class="hidden"
                 style="margin-top:24px;border-top:1px solid var(--gray-200);padding-top:24px;text-align:center;">
              <p style="font-size:11px;font-weight:700;color:var(--gray-400);text-transform:uppercase;letter-spacing:.07em;margin-bottom:6px;">
                Nomor Antrian
              </p>
              <div id="tiket-nomor"
                   style="font-size:72px;font-weight:700;color:var(--orange);line-height:1;letter-spacing:-3px;">—</div>
              <div id="tiket-layanan" style="margin-top:8px;font-size:14px;color:var(--gray-500);font-weight:500;"></div>
              <div id="tiket-nama"   style="margin-top:4px;font-size:14px;color:var(--gray-800);font-weight:600;"></div>
              <button class="btn btn-outline btn-sm" style="margin-top:18px;" id="buat-lagi-btn">
                Buat Antrian Berikutnya
              </button>
            </div>
          </div>
        </div>

      </main>
    </div>

  </div>

  <script src="/js/shared.js"></script>
  <script src="/js/cs.js"></script>
</body>
</html>
