<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Sistem Antrian Bank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

  <div class="auth-layout">
    <div class="auth-card">

      <!-- Logo / Brand -->
      <div class="auth-brand">
        <div class="brand-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
               stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2"/>
            <path d="M16 7V5a2 2 0 0 0-4 0v2"/>
            <path d="M12 12v4"/><path d="M9 12h6"/>
          </svg>
        </div>
        <h1>Sistem Antrian Bank</h1>
        <p>Portal Staf — Masuk atau Daftar</p>
      </div>

      <!-- Tab Masuk / Daftar -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Masuk</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Daftar</button>
      </div>

      <!-- ===== FORM LOGIN ===== -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" autocomplete="email" placeholder="nama@bank.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" autocomplete="current-password" placeholder="Masukkan password" required />
        </div>
        <!-- Pesan error login -->
        <div id="login-error" class="alert alert-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Masuk</button>
      </form>

      <!-- ===== FORM REGISTER ===== -->
      <form id="register-form" class="auth-form hidden">
        <div class="form-group">
          <label for="reg-nama">Nama Lengkap</label>
          <input type="text" id="reg-nama" placeholder="Nama lengkap Anda" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" autocomplete="email" placeholder="nama@bank.com" required />
        </div>
        <div class="form-group">
          <label for="reg-no-hp">Nomor HP</label>
          <input type="tel" id="reg-no-hp" placeholder="08xxxxxxxxxx" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" autocomplete="new-password"
                 placeholder="Minimal 8 karakter" required minlength="8" />
        </div>
        <div class="form-group">
          <label for="reg-role">Role / Jabatan</label>
          <select id="reg-role" class="select-input" required>
            <option value="cs">Customer Service (CS)</option>
            <option value="teller">Teller</option>
          </select>
        </div>
        <!-- Pesan error / sukses register -->
        <div id="register-error"   class="alert alert-error   hidden"></div>
        <div id="register-success" class="alert alert-success  hidden"></div>
        <button type="submit" class="btn btn-primary btn-block" id="register-btn">Buat Akun</button>
      </form>

    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script src="/js/auth.js"></script>
</body>
</html>
