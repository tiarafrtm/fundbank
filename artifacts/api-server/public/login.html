<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk — FundBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/auth.css" />
</head>
<body>

  <div class="auth-layout">
    <div class="auth-card">

      <!-- Logo / Brand -->
      <div class="auth-brand">
        <div class="brand-icon">
          <img src="/images/logo.png" alt="FundBank Logo" style="width:56px;height:56px;object-fit:contain;" />
        </div>
        <h1>FundBank</h1>
        <p>Masuk ke akun staf Anda</p>
      </div>

      <!-- Tab Masuk / Daftar -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login"    onclick="switchTab('login')">Masuk</button>
        <button class="auth-tab"        id="tab-register" onclick="switchTab('register')">Daftar</button>
      </div>

      <!-- ===== FORM MASUK ===== -->
      <form id="login-form" class="auth-form">
        <div class="form-group">
          <label for="email">Alamat Email</label>
          <input type="email" id="email" autocomplete="email" placeholder="nama@bank.com"
                 autocapitalize="none" autocorrect="off" spellcheck="false"
                 inputmode="email" required />
        </div>
        <div class="form-group">
          <label for="password">Kata Sandi</label>
          <div class="pw-wrap">
            <input type="password" id="password" autocomplete="current-password"
                   placeholder="Masukkan kata sandi"
                   autocapitalize="none" autocorrect="off" spellcheck="false" required />
            <button type="button" class="pw-eye" onclick="togglePw('password',this)" tabindex="-1" aria-label="Lihat kata sandi">
              <svg class="eye-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div id="login-error" class="alert alert-error hidden"></div>
        <button type="submit" class="btn btn-primary btn-block" id="login-btn">Masuk</button>
      </form>

      <!-- ===== FORM DAFTAR ===== -->
      <form id="register-form" class="auth-form hidden">
        <div class="form-group">
          <label for="reg-nama">Nama Lengkap</label>
          <input type="text" id="reg-nama" placeholder="Nama lengkap Anda" required />
        </div>
        <div class="form-group">
          <label for="reg-email">Alamat Email</label>
          <input type="email" id="reg-email" autocomplete="email" placeholder="nama@teller.com"
                 autocapitalize="none" autocorrect="off" spellcheck="false"
                 inputmode="email" required />
          <p style="font-size:11px;color:#a8a29e;margin:5px 0 0;line-height:1.4">
            Gunakan email berakhiran <strong>@teller.com</strong> untuk Teller atau <strong>@cs.com</strong> untuk CS.
          </p>
        </div>
        <div class="form-group">
          <label for="reg-no-hp">Nomor Telepon</label>
          <input type="tel" id="reg-no-hp" placeholder="08xxxxxxxxxx" required />
        </div>
        <div class="form-group">
          <label for="reg-password">Kata Sandi</label>
          <div class="pw-wrap">
            <input type="password" id="reg-password" autocomplete="new-password"
                   placeholder="Minimal 8 karakter" required minlength="8" />
            <button type="button" class="pw-eye" onclick="togglePw('reg-password',this)" tabindex="-1" aria-label="Lihat kata sandi">
              <svg class="eye-show" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-hide" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
        </div>
        <div id="register-error"   class="alert alert-error  hidden"></div>
        <div id="register-success" class="alert alert-success hidden"></div>
        <button type="submit" class="btn btn-primary btn-block" id="register-btn">Buat Akun</button>
      </form>

    </div>
  </div>

  <script src="/js/shared.js"></script>
  <script>
    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      const show = btn.querySelector('.eye-show');
      const hide = btn.querySelector('.eye-hide');
      if (inp.type === 'password') {
        inp.type = 'text';
        show.style.display = 'none';
        hide.style.display = '';
      } else {
        inp.type = 'password';
        show.style.display = '';
        hide.style.display = 'none';
      }
    }
  </script>
  <script src="/js/auth.js"></script>
</body>
</html>
